<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You&#x27;re offline — PowerHUB</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-primary: #B23149;
      --font-sans: 'Inter', system-ui, sans-serif;
    }
  </style>
</head>
<body class="h-full flex items-center justify-center bg-gray-50 px-4">
  <div class="text-center max-w-sm">
    <div class="mx-auto mb-6 h-16 w-16 rounded-2xl bg-[#B23149] flex items-center justify-center">
      <span class="text-white font-black text-2xl">{P.}</span>
    </div>
    <h1 class="text-2xl font-bold text-gray-900 mb-2">You&#x27;re offline</h1>
    <p class="text-gray-500 mb-6">Please check your internet connection and try again.</p>
    <button onclick="window.location.reload()"
            class="inline-flex items-center px-5 py-2.5 bg-[#B23149] text-white text-sm font-semibold rounded-lg hover:bg-[#8E273A] transition-colors">
      Try again
    </button>
  </div>
</body>
</html>
