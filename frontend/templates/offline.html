<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>No internet connection — PowerHUB</title>
  <link rel="stylesheet" href="/static/css/tailwind.css">
  <style>
    @media (prefers-color-scheme: dark) {
      html { background: #030712; }
      body { background: #030712; color: #f3f4f6; }
      h1   { color: #f9fafb; }
      p    { color: #9ca3af; }
    }
  </style>
</head>
<body class="h-full flex items-center justify-center bg-gray-50 dark:bg-gray-800 px-4">
  <div class="text-center max-w-sm">
    <div class="mx-auto mb-6 h-16 w-16 rounded-2xl bg-[#B23149] flex items-center justify-center">
      <span class="text-white font-black text-2xl">{P.}</span>
    </div>
    <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100 mb-2">No internet connection</h1>
    <p class="text-gray-500 mb-6">It looks like you&#x27;re offline. Check your Wi-Fi or mobile data and tap &#x201C;Try again&#x201D; when you&#x27;re ready.</p>
    <button onclick="window.location.reload()"
            class="inline-flex items-center px-5 py-2.5 bg-[#B23149] text-white text-sm font-semibold rounded-lg hover:bg-[#8E273A] transition-colors">
      Try again
    </button>
  </div>
</body>
</html>
