{% extends "base.html" %}
{% block title %}Delete Workflow{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-700 p-6">
  <div class="mb-2">
    {% include "includes/_page_title.html" with title="Delete workflow?" title_size="xl" %}
  </div>
  <p class="text-sm text-gray-600 mb-4">
    <strong>{{ workflow.title }}</strong> and all progress will be permanently removed.
  </p>
  <form method="post" class="flex gap-3">
    {% csrf_token %}
    <button type="submit" class="bg-red-600 hover:bg-red-700 text-white text-sm font-semibold px-4 py-2 rounded-lg cursor-pointer">
      Delete
    </button>
    <a href="{% url 'workflows:detail' workflow.pk %}" class="text-sm px-4 py-2 border border-gray-200 rounded-lg text-gray-600">Cancel</a>
  </form>
</div>
{% endblock %}
