{% for enrollment in enrollments %}
<div class="{% if not forloop.last %}mb-4 pb-4 border-b border-gray-100 dark:border-gray-800{% else %}mb-1{% endif %}">
  <div class="flex items-center justify-between gap-2 mb-2">
    <p class="text-sm font-medium text-[#343534] dark:text-gray-100">{{ enrollment.student.display_name }}</p>
    {% if can_manage %}
    <form method="post" action="{% url 'workflows:unenroll' workflow.pk enrollment.student.pk %}" class="pointer-events-auto">
      {% csrf_token %}
      <button type="submit" class="text-gray-300 hover:text-red-400 cursor-pointer" aria-label="Remove {{ enrollment.student.display_name }}">×</button>
    </form>
    {% endif %}
  </div>
  <div class="flex items-center justify-between text-xs text-gray-400 mb-1.5">
    <span>Steps</span>
    <span>{{ enrollment.steps_done }}/{{ steps_total }}</span>
  </div>
  <div class="h-1.5 bg-gray-100 dark:bg-gray-700 rounded-full overflow-hidden">
    <div class="h-full bg-[#B23149] rounded-full transition-all"
         style="width: {{ enrollment.progress_pct }}%"></div>
  </div>
</div>
{% empty %}
<p class="text-xs text-gray-400 mb-4">No students enrolled.</p>
{% endfor %}
