<head>

  <style>
    body { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; margin: 0;

           background: #f9fafb; color: #343534; }

    .code { font-size: 4rem; font-weight: 900; color: #B23149; margin: 0; }

    a { display: inline-block; background: #B23149; color: #fff; text-decoration: none;
        font-weight: 600; font-size: 0.875rem; padding: 0.625rem 1.25rem; border-radius: 0.5rem; }
  </style>
</head>
<body>
  <div class="box">
    <p class="code">500</p>
    <h1>Something went wrong</h1>
