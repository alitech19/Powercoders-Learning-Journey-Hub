<img
    src="{{ user.get_avatar_url }}"
    alt="{{ user.display_name }}"
    width="{{ size|default:32 }}"
    height="{{ size|default:32 }}"
    class="user-avatar shrink-0 rounded-full object-cover{% if css_class %} {{ css_class }}{% endif %}"
    style="width:{{ size|default:32 }}px;height:{{ size|default:32 }}px;min-width:{{ size|default:32 }}px;min-height:{{ size|default:32 }}px;"
>
