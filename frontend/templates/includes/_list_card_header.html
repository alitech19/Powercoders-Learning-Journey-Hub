<div id="list-card-header" class="flex items-center justify-between gap-3 px-5 pt-5 pb-3 border-b border-gray-100 dark:border-gray-800">
  {% if card_title %}
  <h2 class="text-base font-semibold text-[#343534] dark:text-gray-100">{{ card_title }}</h2>
  {% else %}
  <span></span>
  {% endif %}
  {% if create_url %}
  <a href="{{ create_url }}"
     class="inline-flex items-center gap-1.5 bg-[#B23149] hover:bg-[#8E273A] text-white text-xs font-semibold px-3 py-2 rounded-lg transition-colors shadow-sm shrink-0">
    {% if create_icon != 'none' %}
    <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
    </svg>
    {% endif %}
    {{ create_label }}
  </a>
  {% endif %}
</div>
