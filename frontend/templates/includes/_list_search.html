<form method="get" class="mb-4 flex flex-wrap gap-3 items-center">
  <div class="flex-1 min-w-[200px] max-w-md">
    <input type="search" name="q" value="{{ search_query|default:'' }}"
           placeholder="{{ search_placeholder|default:'Search by title…' }}"
           maxlength="{{ limits.search }}"
           class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#C0392B]/30 focus:border-[#C0392B]">
  </div>
  {% if preserve_tag %}<input type="hidden" name="tag" value="{{ preserve_tag }}">{% endif %}
  {% if preserve_student %}<input type="hidden" name="student" value="{{ preserve_student }}">{% endif %}
  {% if preserve_status %}<input type="hidden" name="status" value="{{ preserve_status }}">{% endif %}
  {% if preserve_kind %}<input type="hidden" name="kind" value="{{ preserve_kind }}">{% endif %}
  {% if preserve_sort %}<input type="hidden" name="sort" value="{{ preserve_sort }}">{% endif %}
  <button type="submit"
          class="px-4 py-2 bg-[#2B2B2B] text-white text-sm font-medium rounded-lg cursor-pointer">
    Search
  </button>
  {% if search_query and clear_url %}
  <a href="{{ clear_url }}" class="text-sm text-gray-500 hover:text-[#C0392B]">Clear search</a>
  {% endif %}
</form>
