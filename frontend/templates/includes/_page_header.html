<div class="flex items-center justify-between mb-6">
  <div>
    <h1 class="text-2xl font-bold text-[#2B2B2B]">{{ title }}</h1>
    {% if subtitle %}
    <p class="text-gray-500 text-sm mt-0.5">{{ subtitle }}</p>
    {% endif %}
  </div>
  {% if cta_url %}
  <a href="{{ cta_url }}"
     class="inline-flex items-center gap-2 bg-[#C0392B] hover:bg-[#A93226] text-white text-sm font-semibold px-4 py-2.5 rounded-lg transition-colors">
    {% if cta_icon == 'plus' %}
    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
    </svg>
    {% endif %}
    {{ cta_label }}
  </a>
  {% endif %}
</div>
