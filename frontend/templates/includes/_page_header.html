<div class="mb-6 pr-14">
  <div class="text-center sm:text-left">
    <h1 class="text-2xl font-bold text-[#343534]">{{ title }}</h1>
    {% if subtitle %}
    <p class="text-gray-500 text-sm mt-0.5 max-w-2xl {% if not cta_url %}mx-auto sm:mx-0{% else %}mx-auto sm:mx-0{% endif %}">{{ subtitle }}</p>
    {% endif %}
  </div>
  {% if cta_url %}
  <div class="flex justify-center mt-4">
    <a href="{{ cta_url }}"
       class="inline-flex items-center gap-2 bg-[#B23149] hover:bg-[#8E273A] text-white text-sm font-semibold px-5 py-2.5 rounded-lg transition-colors shadow-sm">
      {% if cta_icon == 'plus' %}
      <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
      </svg>
      {% endif %}
      {{ cta_label }}
    </a>
  </div>
  {% endif %}
</div>
