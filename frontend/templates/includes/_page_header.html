<div class="{% if compact %}mb-3 shrink-0{% else %}mb-6{% endif %}">
  <div class="text-center sm:text-left">
    <div class="flex flex-wrap items-center justify-center sm:justify-start gap-2">
      {% include "includes/_page_title.html" with title=title %}
    </div>
    {% with display_subtitle=subtitle|default:page_meta.purpose %}
    {% if display_subtitle %}
    <p class="text-gray-500 text-sm mt-0.5 max-w-2xl mx-auto sm:mx-0">{{ display_subtitle }}</p>
    {% endif %}
    {% endwith %}
  </div>
</div>
