{# Theme toggle for minimal / auth layouts (no main nav). Requires dark-mode.js + Alpine. #}
<div class="ph-theme-toggle"
     x-data="{ showTip: false }"
     @mouseenter="showTip = true"
     @mouseleave="showTip = false"
     @focusin="showTip = true"
     @focusout="showTip = false">
  <button type="button"
          @click="$store.theme.toggle()"
          :title="$store.theme.tooltip()"
          :aria-label="$store.theme.tooltip()"
          class="p-2.5 rounded-xl bg-white/90 dark:bg-gray-900/90 border border-gray-200 dark:border-gray-700 shadow-sm text-gray-500 dark:text-gray-400 hover:text-[#B23149] dark:hover:text-[#B23149] transition-colors">
    <svg x-show="$store.theme.mode === 'light'" x-cloak class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
    </svg>
    <svg x-show="$store.theme.mode === 'dark'" x-cloak class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <circle cx="12" cy="12" r="9"/>
      <path fill="currentColor" stroke="none" d="M12 3a9 9 0 000 18z"/>
    </svg>
    <svg x-show="$store.theme.mode === 'auto'" x-cloak class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <circle cx="12" cy="12" r="5"/>
      <path stroke-linecap="round" d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
    </svg>
  </button>
  <div x-show="showTip"
       role="tooltip"
       class="theme-mode-tip pointer-events-none absolute top-full right-0 mt-2 w-56 rounded-lg px-3 py-2.5 text-center text-xs font-medium normal-case leading-relaxed tracking-normal shadow-xl">
    <p x-show="$store.theme.mode === 'light'" class="m-0">Light mode (fixed). Click for dark mode.</p>
    <p x-show="$store.theme.mode === 'dark'" class="m-0">Dark mode (fixed). Click for auto (7:00–19:00 light).</p>
    <p x-show="$store.theme.mode === 'auto'" class="m-0">
      Auto —
      <span x-text="$store.theme.dark ? 'dark' : 'light'"></span>
      now. Click for light mode (fixed).
    </p>
  </div>
</div>
