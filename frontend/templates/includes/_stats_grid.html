<div class="grid grid-cols-3 gap-4 mb-6">
  <div class="bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-700 p-4 text-center">
    <p class="text-2xl font-bold {{ stat1_color|default:'text-[#B23149]' }}">{{ stat1_value }}{% if stat1_suffix %}{{ stat1_suffix }}{% endif %}</p>
    <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">{{ stat1_label }}</p>
  </div>
  <div class="bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-700 p-4 text-center">
    <p class="text-2xl font-bold {{ stat2_color|default:'text-[#B23149]' }}">{{ stat2_value }}{% if stat2_suffix %}{{ stat2_suffix }}{% endif %}</p>
    <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">{{ stat2_label }}</p>
  </div>
  <div class="bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-700 p-4 text-center">
    <p class="text-2xl font-bold {{ stat3_color|default:'text-[#B23149]' }}">{{ stat3_value }}{% if stat3_suffix %}{{ stat3_suffix }}{% endif %}</p>
    <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">{{ stat3_label }}</p>
  </div>
</div>
