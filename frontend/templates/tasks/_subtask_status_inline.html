{% if item.can_change_status %}
<div class="flex gap-1 flex-wrap">
  {% for value, label in status_choices %}
  <form hx-post="{% url 'tasks:subtask_status' item.subtask.pk %}"
        hx-target="#subtasks-section"
        hx-swap="outerHTML">
    {% csrf_token %}
    <input type="hidden" name="status" value="{{ value }}">
    <button type="submit" class="px-2 py-1 rounded-lg text-[10px] font-semibold border-2 cursor-pointer transition-colors
      {% if item.display_status == value %}
        {% if value == 'done' %}border-green-500 bg-green-50 text-green-700
        {% elif value == 'doing' %}border-blue-500 bg-blue-50 text-blue-700
        {% elif value == 'blocked' %}border-red-400 bg-red-50 text-red-600
        {% else %}border-gray-400 bg-gray-50 text-gray-700{% endif %}
      {% else %}border-gray-200 text-gray-400 hover:border-gray-300 hover:text-gray-600
      {% endif %}">
      {{ label }}
    </button>
  </form>
  {% endfor %}
</div>
{% else %}
<span class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-medium
  {% if item.display_status == 'done' %}bg-green-100 text-green-800
  {% elif item.display_status == 'doing' %}bg-blue-100 text-blue-800
  {% elif item.display_status == 'blocked' %}bg-red-100 text-red-800
  {% else %}bg-gray-100 text-gray-700{% endif %}">
  {% if item.display_status == 'done' %}Done
  {% elif item.display_status == 'doing' %}Doing
  {% elif item.display_status == 'blocked' %}Blocked
  {% else %}To do{% endif %}
</span>
{% endif %}
