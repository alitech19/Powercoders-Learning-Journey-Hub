<section class="{% if not forloop.first %}pt-6 mt-6 border-t border-gray-100{% endif %}">
  <div class="flex flex-wrap items-start justify-between gap-3 mb-4">
    <div>
      <div class="flex items-center gap-2 mb-1">
        <h3 class="text-sm font-semibold text-[#343534] uppercase tracking-wide">{{ section.label }}</h3>
        <span class="text-xs font-semibold px-2 py-0.5 rounded-full {{ section.badge }}">
          {{ section.rows|length }}
        </span>
      </div>
      <p class="text-sm text-gray-500">{{ section.description }}</p>
    </div>
    <a href="?kind={{ section.kind }}&sort={{ sort_by }}{% if status_filter %}&status={{ status_filter }}{% endif %}{% if student_filter %}&student={{ student_filter }}{% endif %}"
       class="text-xs text-[#B23149] hover:text-[#8E273A] font-medium whitespace-nowrap">
      {{ section.label }} only →
    </a>
  </div>
  {% include "tasks/_task_cards.html" with task_rows=section.rows show_empty=False %}
</section>
