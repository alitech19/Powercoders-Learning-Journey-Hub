{% extends "base.html" %}
{% block title %}{{ heading|default:"Add comment" }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <a href="{% url 'tasks:task_detail' task.pk %}" class="text-sm text-gray-400 hover:text-[#B23149] mb-4 inline-block">← Back</a>
  <h1 class="text-xl font-bold mb-1">{{ heading|default:"Add comment" }}</h1>
  {% if parent_comment %}
  <p class="text-sm text-gray-500 mb-4">Replying to {{ parent_comment.author.display_name }}</p>
  {% endif %}
  <form method="post" class="bg-white rounded-xl border border-gray-200 p-5 space-y-4">
    {% csrf_token %}
    <textarea name="text" rows="4" required placeholder="Write your comment…" maxlength="{{ limits.body }}"
              class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">{{ form.text.value|default:'' }}</textarea>
    <button type="submit" class="bg-[#B23149] hover:bg-[#8E273A] text-white text-sm font-semibold px-4 py-2 rounded-lg cursor-pointer">Save</button>
  </form>
</div>
{% endblock %}
