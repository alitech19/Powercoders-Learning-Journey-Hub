{% extends "base.html" %}
{% block title %}Delete Reflection{% endblock %}

{% block content %}
<div class="max-w-md mx-auto text-center py-12">
  <div class="mb-2 flex justify-center">
    {% include "includes/_page_title.html" with title="Delete this reflection?" title_size="xl" %}
  </div>
  <p class="text-sm text-gray-500 mb-6">"{{ reflection.title }}" will be permanently removed.</p>
  <form method="post" class="flex gap-3 justify-center">
    {% csrf_token %}
    <button type="submit" class="bg-red-600 hover:bg-red-700 text-white text-sm font-semibold px-5 py-2.5 rounded-lg cursor-pointer">
      Delete
    </button>
    <a href="{% url 'reflections:detail' reflection.pk %}" class="px-5 py-2.5 rounded-lg border border-gray-300 dark:border-gray-600 text-sm text-gray-600 dark:text-gray-400">Cancel</a>
  </form>
</div>
{% endblock %}
