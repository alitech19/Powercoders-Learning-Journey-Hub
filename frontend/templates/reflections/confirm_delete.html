{% extends "base.html" %}
{% block title %}Delete Reflection{% endblock %}

{% block content %}
<div class="max-w-md mx-auto text-center py-12">
  <h1 class="text-xl font-bold text-[#2B2B2B] mb-2">Delete this reflection?</h1>
  <p class="text-sm text-gray-500 mb-6">"{{ reflection.title }}" will be permanently removed.</p>
  <form method="post" class="flex gap-3 justify-center">
    {% csrf_token %}
    <button type="submit" class="bg-red-600 hover:bg-red-700 text-white text-sm font-semibold px-5 py-2.5 rounded-lg cursor-pointer">
      Delete
    </button>
    <a href="{% url 'reflections:detail' reflection.pk %}" class="px-5 py-2.5 rounded-lg border border-gray-300 text-sm text-gray-600">Cancel</a>
  </form>
</div>
{% endblock %}
