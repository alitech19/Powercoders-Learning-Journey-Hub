{% extends "base.html" %}
{% block title %}Reactivate {{ target.display_name }}{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
  <div class="bg-white rounded-xl border border-green-200 p-8 text-center">
    <div class="h-14 w-14 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-4">
      <svg class="h-7 w-7 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
    </div>
    <h1 class="text-xl font-bold text-[#2B2B2B] mb-2">Reactivate account?</h1>
    <p class="text-sm text-gray-500 mb-1">
      <span class="font-semibold text-[#2B2B2B]">{{ target.display_name }}</span> ({{ target.email }})
    </p>
    <p class="text-sm text-gray-500 mb-6">
      This user will be able to log in again with their existing credentials.
    </p>
    <div class="flex gap-3 justify-center">
      <a href="{% url 'accounts:user_list' %}"
         class="px-5 py-2.5 border border-gray-200 rounded-lg text-sm font-medium text-gray-600 hover:border-gray-300 transition-colors">
        Cancel
      </a>
      <form method="post">
        {% csrf_token %}
        <button type="submit"
                class="px-5 py-2.5 bg-green-600 hover:bg-green-700 text-white rounded-lg text-sm font-semibold transition-colors">
          Reactivate
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
