{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Reset Complete — Powercoders Learning Journey Hub</title>
  <link rel="icon" type="image/svg+xml" href="{% static 'img/favicon.svg' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/tailwind.css' %}">
  <script src="{% static 'js/dark-mode-init.js' %}"></script>
</head>
<body class="min-h-full bg-[#F5EDE0] dark:bg-gray-950 py-8 px-4">
  <div class="w-full max-w-5xl mx-auto">

    <div class="text-center mb-8">
      <div class="font-black text-3xl tracking-tight leading-none mb-2">
        <span class="text-[#B23149]">{</span><span class="text-[#343534] dark:text-gray-100">POWER</span><span class="text-[#B23149]">.</span><span class="text-[#343534] dark:text-gray-100">CODERS</span><span class="text-[#B23149]">}</span>
      </div>
      <p class="text-[#343534] dark:text-gray-100/50 text-sm font-medium">Learning Journey Hub</p>
    </div>

    <div class="max-w-md mx-auto bg-white dark:bg-gray-900 rounded-2xl shadow-xl border border-[#EDE3D5] dark:border-gray-700 p-8 text-center">
      <div class="w-14 h-14 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-7 h-7 text-green-600 dark:text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-[#343534] dark:text-gray-100 mb-2">Password updated</h1>
      <p class="text-gray-500 dark:text-gray-400 text-sm mb-6">
        Your password has been set. You can now sign in with your new password.
      </p>
      <a href="{% url 'two_factor:login' %}"
         class="inline-block w-full bg-[#B23149] hover:bg-[#8E273A] text-white font-semibold py-2.5 px-4 rounded-lg transition-colors text-sm text-center">
        Sign in
      </a>
    </div>

    <p class="text-center text-xs text-[#343534] dark:text-gray-100/40 mt-8">© 2026 Powercoders</p>
  </div>
</body>
</html>
