{% extends "base.html" %}
{% block title %}Account Deleted{% endblock %}

{% block content %}
<div class="max-w-md mx-auto text-center py-20">
  <div class="text-5xl mb-4">👋</div>
  <h1 class="text-2xl font-bold text-[#2B2B2B] mb-2">Your account has been deleted</h1>
  <p class="text-gray-500 text-sm mb-6">
    All your personal data has been permanently removed from the platform in accordance with GDPR / nDSG.
  </p>
  <a href="{% url 'two_factor:login' %}"
     class="inline-flex items-center gap-2 bg-[#C0392B] hover:bg-[#A93226] text-white text-sm font-semibold px-5 py-2.5 rounded-lg transition-colors">
    Back to login
  </a>
</div>
{% endblock %}
