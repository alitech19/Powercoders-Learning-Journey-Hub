{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Powercoders Learning Journey Hub</title>
  <link rel="icon" type="image/svg+xml" href="{% static 'img/favicon.svg' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/tailwind.css' %}">
  <script src="{% static 'js/dark-mode-init.js' %}"></script>
</head>
<body class="min-h-full bg-[#F5EDE0] dark:bg-gray-950 py-8 px-4">
  <div class="w-full max-w-5xl mx-auto">

    <div class="text-center mb-8">
      <div class="font-black text-3xl tracking-tight leading-none mb-2">
        <span class="text-[#B23149]">{</span><span class="text-[#343534] dark:text-gray-100">POWER</span><span class="text-[#B23149]">.</span><span class="text-[#343534] dark:text-gray-100">CODERS</span><span class="text-[#B23149]">}</span>
      </div>
      <p class="text-[#343534] dark:text-gray-100/50 text-sm font-medium">Learning Journey Hub</p>
    </div>

    <div class="max-w-md mx-auto bg-white dark:bg-gray-900 rounded-2xl shadow-xl border border-[#EDE3D5] dark:border-gray-700 p-8">
      <h1 class="text-2xl font-bold text-[#343534] dark:text-gray-100 mb-1">Forgot your password?</h1>
      <p class="text-gray-500 dark:text-gray-400 text-sm mb-6">Enter your email address and we'll send you a link to reset it.</p>

      <form method="post" class="space-y-5">
        {% csrf_token %}
        <div>
          <label for="id_email" class="block text-sm font-semibold text-[#343534] dark:text-gray-100 mb-1.5">Email address</label>
          <input type="email" name="email" id="id_email" required autofocus
                 class="w-full px-4 py-2.5 rounded-lg border border-gray-300 dark:border-gray-600 text-sm focus:outline-none focus:ring-2 focus:ring-[#B23149]/30 focus:border-[#B23149]">
        </div>
        <button type="submit"
                class="w-full bg-[#B23149] hover:bg-[#8E273A] text-white font-semibold py-2.5 px-4 rounded-lg transition-colors text-sm cursor-pointer">
          Send reset link
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 dark:text-gray-400 mt-6">
        Remember your password?
        <a href="{% url 'two_factor:login' %}" class="text-[#B23149] hover:text-[#8E273A] font-medium">Sign in</a>
      </p>
    </div>

    <p class="text-center text-xs text-[#343534] dark:text-gray-100/40 mt-8">© 2026 Powercoders</p>
  </div>
</body>
</html>
