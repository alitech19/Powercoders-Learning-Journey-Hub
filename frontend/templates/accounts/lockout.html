{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Locked — Powercoders</title>
  <link rel="icon" type="image/svg+xml" href="{% static 'img/favicon.svg' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/tailwind.css' %}">
</head>
<body class="h-full bg-[#F5EDE0] flex items-center justify-center p-4">
  <div class="w-full max-w-md text-center">
    <div class="font-black text-3xl tracking-tight mb-8">
      <span class="text-[#B23149]">{</span><span class="text-[#343534]">POWER</span><span class="text-[#B23149]">.</span><span class="text-[#343534]">CODERS</span><span class="text-[#B23149]">}</span>
    </div>
    <div class="bg-white rounded-2xl shadow-xl border border-[#EDE3D5] p-8">
      <div class="h-14 w-14 rounded-full bg-red-100 flex items-center justify-center mx-auto mb-4">
        <svg class="h-7 w-7 text-[#B23149]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
      </div>
      <h1 class="text-xl font-bold text-[#343534] mb-2">Account Temporarily Locked</h1>
      <p class="text-gray-500 text-sm mb-1">Too many failed login attempts detected.</p>
      <p class="text-gray-500 text-sm mb-6">
        Please wait <strong>1 hour</strong> before trying again, or contact your teacher or admin to unlock your account.
      </p>
      <a href="{% url 'two_factor:login' %}"
         class="inline-block text-sm text-[#B23149] hover:text-[#8E273A] font-medium">
        Back to login
      </a>
    </div>
    <p class="text-xs text-[#343534]/40 mt-6">© 2026 Powercoders</p>
  </div>
</body>
</html>
