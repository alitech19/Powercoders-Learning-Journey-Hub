{% extends "base.html" %}
{% block title %}Delete Cohort{% endblock %}

{% block content %}

<div class="max-w-md mx-auto">
  <div class="bg-white rounded-xl border border-red-200 p-6 text-center">
    <div class="h-12 w-12 rounded-full bg-red-100 flex items-center justify-center mx-auto mb-4">
      <svg class="h-6 w-6 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
      </svg>
    </div>
    <h1 class="text-lg font-bold text-[#343534] mb-2">Delete cohort?</h1>
    <p class="text-gray-500 text-sm mb-1">
      You are about to delete <strong class="text-[#343534]">{{ cohort.name }}</strong>.
    </p>
    <p class="text-red-500 text-xs mb-6">This will also delete all groups and associated data. This cannot be undone.</p>
    <form method="post" class="flex gap-3 justify-center">
      {% csrf_token %}
      <button type="submit"
              class="bg-red-500 hover:bg-red-600 text-white text-sm font-semibold px-5 py-2.5 rounded-lg transition-colors">
        Yes, delete
      </button>
      <a href="{% url 'accounts:cohort_list' %}"
         class="border border-gray-200 hover:border-gray-300 text-gray-600 text-sm font-medium px-5 py-2.5 rounded-lg transition-colors">
        Cancel
      </a>
    </form>
  </div>
</div>

{% endblock %}
