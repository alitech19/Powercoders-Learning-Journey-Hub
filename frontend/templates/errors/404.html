{% extends "base.html" %}
{% block title %}Page not found{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto text-center py-16 px-4">
  <h1 class="text-2xl font-bold text-[#343534] dark:text-gray-100 mb-3">Page not found</h1>
  <p class="text-gray-600 dark:text-gray-400 text-sm mb-6">
    That link may be broken or the page was removed.
  </p>
  <a href="{% url 'dashboard:dashboard' %}"
     class="inline-flex items-center justify-center bg-[#B23149] hover:bg-[#8E273A] text-white text-sm font-semibold px-5 py-2.5 rounded-lg transition-colors">
    Back to dashboard
  </a>
</div>
{% endblock %}
