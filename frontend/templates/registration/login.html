{% extends "base.html" %}

{% block title %}Login — PowerHUB{% endblock %}

{% block content %}
<h1>Login</h1>

{% if form.errors %}
    <p>Invalid email or password.</p>
{% endif %}

<form method="post" action="{% url 'accounts:login' %}">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Log in</button>
</form>
{% endblock %}
