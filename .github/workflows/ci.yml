name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    name: Tests (Python 3.12 + PostgreSQL 17 + Redis)
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: powerhub_test
          POSTGRES_USER: powerhub
          POSTGRES_PASSWORD: powerhub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U powerhub -d powerhub_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DEBUG: 'True'
      SECRET_KEY: ci-insecure-key-not-for-production
      ALLOWED_HOSTS: localhost,127.0.0.1
      POSTGRES_DB: powerhub_test
      POSTGRES_USER: powerhub
      POSTGRES_PASSWORD: powerhub
      POSTGRES_HOST: localhost
      POSTGRES_PORT: '5432'
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      SLACK_WEBHOOK_URL: ''
      CREATE_DEV_SUPERUSER: 'false'
      ENABLE_DEV_SEED: 'false'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run migrations
        working-directory: backend
        run: python manage.py migrate --noinput

      - name: Check for missing migrations
        working-directory: backend
        run: python manage.py migrate --check

      - name: Test cohorts
        working-directory: backend
        run: python manage.py test cohorts --verbosity=2

      - name: Test accounts
        working-directory: backend
        run: python manage.py test accounts --verbosity=2

      - name: Test workflows
        working-directory: backend
        run: python manage.py test workflows --verbosity=2

      - name: Test feedback
        working-directory: backend
        run: python manage.py test feedback --verbosity=2

      - name: Test goals
        working-directory: backend
        run: python manage.py test goals --verbosity=2

      - name: Test tasks
        working-directory: backend
        run: python manage.py test tasks --verbosity=2

      - name: Test reflections
        working-directory: backend
        run: python manage.py test reflections --verbosity=2

      - name: Test journal
        working-directory: backend
        run: python manage.py test journal --verbosity=2

      - name: Test habits
        working-directory: backend
        run: python manage.py test habits --verbosity=2

      - name: Test group_space
        working-directory: backend
        run: python manage.py test group_space --verbosity=2

      - name: Test resources
        working-directory: backend
        run: python manage.py test resources --verbosity=2

      - name: Test dashboard
        working-directory: backend
        run: python manage.py test dashboard --verbosity=2

      - name: Test info
        working-directory: backend
        run: python manage.py test info --verbosity=2
