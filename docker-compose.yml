services:
  db:
    image: postgres:17-alpine
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    working_dir: /app/backend
    ports:
      - '8000:8000'
    env_file:
      - .env
    volumes:
      - .:/app
      - ./backend/media:/app/backend/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # DEV ONLY: set CREATE_DEV_SUPERUSER=true in .env to auto-create the dev admin account.
    # Leave unset (or false) in staging/production. seed_dev_data respects ENABLE_DEV_SEED.
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             if [ \"$$CREATE_DEV_SUPERUSER\" = 'true' ]; then python manage.py create_dev_superuser; fi &&
             python manage.py seed_dev_data &&
             python manage.py runserver 0.0.0.0:8000"

  worker:
    build: .
    working_dir: /app/backend
    env_file:
      - .env
    volumes:
      - .:/app
      - ./backend/media:/app/backend/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config worker --loglevel=info

  beat:
    build: .
    working_dir: /app/backend
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

volumes:
  postgres_data:
