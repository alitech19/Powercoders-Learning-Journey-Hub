{% extends "base.html" %}

{% block title %}Update status — PowerHUB{% endblock %}

{% block content %}
<h2>Update status</h2>
<p>Task: {{ task.title }}</p>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save</button>
</form>
<p><a href="{% url 'tracker:task_detail' task.pk %}">Cancel</a></p>
{% endblock %}
