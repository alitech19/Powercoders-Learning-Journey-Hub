{% extends "base.html" %}

{% block title %}Create cohort task — PowerHUB{% endblock %}

{% block content %}
<h2>Create cohort task</h2>
<p>Cohort: {{ cohort.name }}</p>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save</button>
</form>
<p><a href="{% url 'tracker:task_list' %}">Cancel</a></p>
{% endblock %}
