<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Home</title>
</head>
<body>
    <h1>Home</h1>
    <p><strong>Username:</strong> {{ user.username }}</p>
    <p><strong>Role:</strong> {{ user.get_role_display }}</p>
    <p><strong>Cohort:</strong>
        {% if user.cohort %}
            {{ user.cohort.name }}
        {% else %}
            —
        {% endif %}
    </p>
    <p><a href="{% url 'logout' %}">Log out</a></p>
</body>
</html>
